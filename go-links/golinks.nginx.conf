# Go-links server - redirect-based
# Pattern: y/<app> -> <app>.y -> redirects to actual service

# pics.y -> Immich (reverse proxy)
server {
    listen 80;
    listen [::]:80;
    server_name pics.y;

    client_max_body_size 50G;

    location / {
        proxy_pass http://10.0.0.100:2283;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Immich
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_request_buffering off;
    }
}

# router.y -> Router
server {
    listen 80;
    listen [::]:80;
    server_name router.y;
    return 302 http://10.0.1.1$request_uri;
}

# pihole.y -> Pi-hole admin
server {
    listen 80;
    listen [::]:80;
    server_name pihole.y;
    return 302 http://10.0.1.10:8080/admin$request_uri;
}

# admin.y -> Link directory
server {
    listen 80;
    listen [::]:80;
    server_name admin.y;

    location / {
        gzip off;
        include fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /usr/lib/cgi-bin/golinks-admin;
    }
}

# wiki.y -> Wikipedia
server {
    listen 80;
    listen [::]:80;
    server_name wiki.y;
    return 302 https://en.wikipedia.org$request_uri;
}


# pad.y -> Collaborative pad
server {
    listen 80;
    listen [::]:80;
    server_name pad.y;

    root /home/saahas/pad/media;
    client_max_body_size 0;

    # API endpoints go directly to app
    location ~ ^/(upload|delete|files|ws)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Try static file first, then proxy to app
    location / {
        try_files $uri @app;
    }

    location @app {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# cam.y -> Camera Mux (MJPEG relay)
server {
    listen 80;
    listen [::]:80;
    server_name cam.y;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }
}

# HTTPS catch-all -> redirect to HTTP
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    ssl_certificate /etc/nginx/ssl/golinks.crt;
    ssl_certificate_key /etc/nginx/ssl/golinks.key;
    server_name _;
    return 301 http://$host$request_uri;
}

# Main redirector: y/<app> -> <app>.y
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name y y.lan go.y _;

    location ~ ^/([a-z0-9-]+)(/.*)?$ {
        return 302 http://$1.y$2;
    }

    location / {
        default_type text/plain;
        return 200 "Go-links: y/<app> -> <app>.y\n\nAvailable:\n  y/pics   -> Immich\n  y/router -> Router\n  y/pihole -> Pi-hole\n  y/wiki   -> Wikipedia\n  y/pad    -> Collaborative pad\n  y/cam    -> Camera stream\n";
    }
}
